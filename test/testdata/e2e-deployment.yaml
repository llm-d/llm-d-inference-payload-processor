# Llama model server simulator
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama3-8b-instruct
  namespace: $E2E_NS
  labels:
    app: vllm-llama3-8b-instruct
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-llama3-8b-instruct
  template:
    metadata:
      labels:
        app: vllm-llama3-8b-instruct
    spec:
      containers:
        - name: sim
          image: $E2E_SIM_IMAGE
          imagePullPolicy: IfNotPresent
          args:
            - --port=8000
            - --model=meta-llama/Llama-3.1-8B-Instruct
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-llama3-8b-instruct
  namespace: $E2E_NS
spec:
  selector:
    app: vllm-llama3-8b-instruct
  ports:
    - port: 8000
      targetPort: 8000
---
# ConfigMaps for adapter -> base-model mapping (created BEFORE PP so reconciler picks them up)
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-adapters
  namespace: $E2E_NS
  labels:
    inference.llm-d.io/ipp-managed: "true"
data:
  baseModel: meta-llama/Llama-3.1-8B-Instruct
  adapters: |
    - llama-adapter-1
    - llama-adapter-2
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: deepseek-adapters
  namespace: $E2E_NS
  labels:
    inference.llm-d.io/ipp-managed: "true"
data:
  baseModel: deepseek-ai/DeepSeek-R1
  adapters: |
    - deepseek-adapter-1
    - deepseek-adapter-2
---
# Payload Processor
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payload-processor
  namespace: $E2E_NS
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: payload-processor-auth-reviewer
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: payload-processor-auth-reviewer-binding
subjects:
  - kind: ServiceAccount
    name: payload-processor
    namespace: $E2E_NS
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: payload-processor-auth-reviewer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payload-processor
  namespace: $E2E_NS
  labels:
    app: payload-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payload-processor
  template:
    metadata:
      labels:
        app: payload-processor
    spec:
      serviceAccountName: payload-processor
      containers:
        - name: payload-processor
          image: $E2E_IMAGE
          imagePullPolicy: Never
          args:
            - --grpc-port=9004
            - --grpc-health-port=9005
            - --metrics-port=9090
            - --secure-serving=false
            - --streaming
            - --tracing=false
            - --metrics-endpoint-auth=false
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 9004
              name: grpc
            - containerPort: 9005
              name: health
            - containerPort: 9090
              name: metrics
          readinessProbe:
            grpc:
              port: 9005
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payload-processor
  namespace: $E2E_NS
spec:
  selector:
    app: payload-processor
  ports:
    - name: grpc
      port: 9004
      targetPort: 9004
    - name: metrics
      port: 9090
      targetPort: 9090
