name: CI - Dev

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.meta.outputs.project_name }}
      tag: ${{ steps.tag.outputs.tag }}
      prerelease: ${{ steps.tag.outputs.prerelease }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set project name from repository
        id: meta
        run: |
          repo="${GITHUB_REPOSITORY##*/}"
          echo "project_name=$repo" >> "$GITHUB_OUTPUT"

      - name: Determine tag
        id: tag
        run: |
          echo "tag=latest" >> "$GITHUB_OUTPUT"
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
        shell: bash

  docker-build-and-push:
    needs: prepare
    uses: ./.github/workflows/ci-build-image.yaml
    with:
      image-name: ${{ needs.prepare.outputs.project_name }}
      tag: ${{ needs.prepare.outputs.tag }}
      prerelease: ${{ needs.prepare.outputs.prerelease }}
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}